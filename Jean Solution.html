<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jean Solution - Tienda</title>
<style>
body{font-family:Arial;margin:0;background:#f4f4f4}
header{background:#0a66c2;color:#fff;padding:20px;text-align:center}
nav{background:#222;color:#fff;display:flex;justify-content:space-between;align-items:center;padding:10px 20px}
.container{padding:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px}
.card{background:#fff;border-radius:12px;padding:15px;box-shadow:0 2px 6px rgba(0,0,0,.1);text-align:center}
.price{color:#0a66c2;font-weight:bold}
button{background:#0a66c2;color:#fff;border:none;padding:8px 12px;border-radius:6px;cursor:pointer}
#cart,#historial,#adminPanel{margin-top:20px;background:#fff;padding:15px;border-radius:10px}
.badge{background:red;color:white;padding:3px 7px;border-radius:50%}
#authModal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);display:none;justify-content:center;align-items:center}
#authContent{background:#fff;padding:20px;border-radius:10px;width:250px}
input{width:100%;margin-bottom:5px;padding:5px}
</style>
</head>
<body>

<header>
<h1>Jean Solution</h1>
<p>Tienda de computadoras y componentes</p>
</header>

<nav>
<div>
<button id="authBtn" onclick="toggleAuth()">Iniciar sesión / Registrarse</button>
<button onclick="logout()">Cerrar sesión</button>
</div>
<div>
<span id="userInfo"></span>
🛒 <span id="count" class="badge">0</span>
</div>
</nav>

<div id="authModal">
<div id="authContent">
<h3>Login</h3>
<input id="loginUser" placeholder="Usuario">
<input id="loginPass" type="password" placeholder="Contraseña">
<button onclick="login()">Entrar</button>

<h3>Registro</h3>
<input id="regUser" placeholder="Nuevo usuario">
<input id="regPass" type="password" placeholder="Nueva contraseña">
<button onclick="registrar()">Registrarse</button>

<button onclick="toggleAuth()">Cerrar</button>
<p id="status"></p>
</div>
</div>

<div class="container">
<h2>Productos</h2>
<div class="grid" id="products"></div>

<div id="cart">
<h2>Carrito</h2>
<div id="cartItems"></div>
<p>Total: $<span id="total">0</span></p>
<button onclick="pagar()">Finalizar compra</button>
</div>

<div id="historial">
<h2>Historial de compras</h2>
<div id="historialItems"></div>
</div>

<div id="adminPanel" style="display:none">
<h2>Panel de Administrador</h2>
<input id="newName" placeholder="Nombre producto">
<input id="newPrice" type="number" placeholder="Precio">
<button onclick="agregarProducto()">Agregar producto</button>

<h3>Compras de todos los usuarios</h3>
<div id="todasCompras"></div>
</div>

</div>

<script>
let usuarios = JSON.parse(localStorage.getItem("usuarios")) || [];
let compras = JSON.parse(localStorage.getItem("compras")) || {};
let usuarioActual = null;
let esAdmin = false;
let carrito=[];

if(!usuarios.find(u=>u.user==="admin")){
 usuarios.push({user:"admin",pass:"1234",rol:"admin"});
 localStorage.setItem("usuarios",JSON.stringify(usuarios));
}

let productos = JSON.parse(localStorage.getItem("productos")) || [
{name:"Laptop Gaming",precio:1200},
{name:"PC de Escritorio",precio:900},
{name:"Tarjeta Gráfica RTX 3060",precio:500},
{name:"Tarjeta Gráfica RX 6600",precio:450},
{name:"Memoria RAM 8GB",precio:40},
{name:"Memoria RAM 16GB",precio:80},
{name:"Disco SSD 500GB",precio:70},
{name:"Disco SSD 1TB",precio:120},
{name:"Procesador Ryzen 5",precio:200},
{name:"Procesador Intel i7",precio:320},
{name:"Monitor 24 pulgadas",precio:180},
{name:"Monitor 27 pulgadas",precio:250},
{name:"Teclado Mecánico",precio:60},
{name:"Mouse Gaming",precio:35},
{name:"Fuente de Poder 650W",precio:90},
{name:"Gabinete RGB",precio:110}
];

function toggleAuth(){
 let modal=document.getElementById("authModal");
 modal.style.display = modal.style.display==="flex" ? "none" : "flex";
}

function registrar(){
 let u=document.getElementById("regUser").value;
 let p=document.getElementById("regPass").value;
 if(!u||!p){alert("Completa datos");return;}
 usuarios.push({user:u,pass:p,rol:"user"});
 localStorage.setItem("usuarios",JSON.stringify(usuarios));
 alert("Usuario registrado correctamente");
 toggleAuth();
}

function login(){
 let u=document.getElementById("loginUser").value;
 let p=document.getElementById("loginPass").value;
 let encontrado=usuarios.find(x=>x.user===u && x.pass===p);
 if(encontrado){
  usuarioActual=u;
  esAdmin = encontrado.rol === "admin";
  alert("Sesión iniciada correctamente");
  toggleAuth();
  document.getElementById("authBtn").style.display="none";
  document.getElementById("userInfo").textContent="Bienvenido, "+u;
  if(esAdmin){document.getElementById("adminPanel").style.display="block"; cargarTodasCompras();}
  cargarHistorial();
 }else{
  document.getElementById("status").textContent="Error login";
 }
}

function logout(){
 usuarioActual = null;
 esAdmin = false;
 document.getElementById("adminPanel").style.display="none";
 document.getElementById("historialItems").innerHTML="";
 document.getElementById("userInfo").textContent="";
 document.getElementById("authBtn").style.display="inline-block";
 alert("Sesión cerrada");
}

function render(){
 let cont=document.getElementById("products");
 cont.innerHTML="";
 productos.forEach((p,i)=>{
  cont.innerHTML+=`<div class='card'>
  <h3>${p.name}</h3>
  <p class='price'>$${p.precio}</p>
  <button onclick='add(${i})'>Agregar</button>
  </div>`;
 });
}

function add(i){
 if(!usuarioActual){alert("Inicia sesión");return;}
 carrito.push(productos[i]);
 update();
}

function update(){
 let items=document.getElementById("cartItems");
 let total=0;
 items.innerHTML="";
 carrito.forEach(p=>{
  total+=p.precio;
  items.innerHTML+=p.name+" - $"+p.precio+"<br>";
 });
 document.getElementById("total").textContent=total;
 document.getElementById("count").textContent=carrito.length;
}

function pagar(){
 if(!usuarioActual){alert("Debes iniciar sesión");return;}
 if(carrito.length===0){alert("Carrito vacío");return;}

 if(!compras[usuarioActual]) compras[usuarioActual]=[];
 compras[usuarioActual].push([...carrito]);
 localStorage.setItem("compras",JSON.stringify(compras));

 alert("Compra realizada correctamente");
 carrito=[];
 update();
 cargarHistorial();
 if(esAdmin) cargarTodasCompras();
}

function cargarHistorial(){
 let cont=document.getElementById("historialItems");
 cont.innerHTML="";
 let historial=compras[usuarioActual] || [];
 let recientes = historial.slice(-3);
 recientes.forEach((compra,i)=>{
  cont.innerHTML+=`<p><strong>Reciente ${i+1}:</strong> ${compra.map(p=>p.name).join(", ")}</p>`;
 });
}

function cargarTodasCompras(){
 let cont=document.getElementById("todasCompras");
 cont.innerHTML="";
 for(let user in compras){
  cont.innerHTML+=`<p><strong>${user}:</strong> ${compras[user].map(c=>c.map(p=>p.name).join(", ")).join(" | ")}</p>`;
 }
}

function agregarProducto(){
 let name=document.getElementById("newName").value;
 let price=document.getElementById("newPrice").value;
 if(!name||!price){alert("Completa datos");return;}
 productos.push({name:name,precio:parseFloat(price)});
 localStorage.setItem("productos",JSON.stringify(productos));
 render();
}

render();
</script>

</body>
</html>
